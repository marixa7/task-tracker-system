name: Multi-module CI

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-tracker-system
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test with Maven
        run: mvn clean verify

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-tracker-system
    strategy:
      matrix:
        module: [backend, email-sender, scheduler]
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image for ${{ matrix.module }}
        run: docker build -t ${{ matrix.module }}:${{ github.sha }} ./${{ matrix.module }}
